<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mitzCanCode</title>
  </head>
  <body>

    <div class="fixed inset-0 overflow-hidden bg-black">

    <!-- STAR FIELD -->
    
    <div class="relative w-screen h-screen">
      <div class="crt-screen">
        <!-- SCREEN -->
        <div class="crt-display">
          <div class="stars"></div>

          <div id="screenContent" class="crt-content"></div>

          <div class="project-window-container"></div>

          <div class="crt-scanlines"></div>
          <div class="crt-noise"></div>
          <div class="crt-flicker"></div>
        </div>
      </div>
      <!-- TV FRAME -->
      <img
        src="/src/assets/tvDesktop.png"
        class="
          absolute
          inset-0
          w-full
          h-full
          object-fill
          z-10
          pointer-events-none
        "
      />

    </div>

  </div>

  <script type="module" src="/src/main.js"></script>

  </body>
</html>
